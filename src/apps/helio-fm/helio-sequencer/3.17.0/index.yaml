name: Helio
author: Helio
description: A free and open-source music sequencer for desktop and mobile platforms, featuring a linear/pattern-based sequencer, integrated version control, and microtonal temperament support.
license: gpl-3.0
type: tool
tags:
  - Sequencer
  - Composition
  - Microtonal
  - Cross-platform
